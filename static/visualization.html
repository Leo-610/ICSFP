<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时预测与可视化 - ICSFP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="/static/particles-tech.js"></script>
    <style>
        :root {
            --primary-color: #0066FF;
            --secondary-color: #00C48C;
            --background-dark: #0B0E11;
            --surface-color: #1E222D;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #D1D4DC;
            --text-secondary: #787B86;
            --success-color: #26A69A;
            --danger-color: #EF5350;
            --warning-color: #FFA726;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--background-dark);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            color: var(--text-secondary);
        }

        .controls {
            background: var(--surface-color);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            animation: slideInUp 0.5s ease-out;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.05), rgba(0, 196, 140, 0.05));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .controls:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 35px rgba(0, 102, 255, 0.2),
                0 0 20px rgba(0, 196, 140, 0.15),
                inset 0 0 0 1px rgba(0, 102, 255, 0.3);
            border-color: var(--primary-color);
        }

        .controls:hover::before {
            opacity: 1;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: 600;
            color: var(--text-primary);
        }

        input, select, button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        select {
            min-width: 200px;
            max-width: 280px;
            cursor: pointer;
        }

        input[type="text"] {
            min-width: 150px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        /* 选项组样式 */
        optgroup {
            font-weight: 600;
            font-style: normal;
            background: rgba(0, 102, 255, 0.1);
        }

        option {
            padding: 8px;
        }

        button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover:before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .chart-container {
            background: var(--surface-color);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInUp 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.08), rgba(0, 196, 140, 0.08));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .chart-container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 20px 40px rgba(0, 102, 255, 0.2),
                0 0 25px rgba(0, 196, 140, 0.15),
                inset 0 0 0 1px rgba(0, 102, 255, 0.5);
            border-color: var(--primary-color);
        }

        .chart-container:hover::before {
            opacity: 1;
        }

        .prediction-panel {
            background: var(--surface-color);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInUp 0.7s ease-out;
            position: relative;
            overflow: hidden;
        }

        .prediction-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.08), rgba(0, 196, 140, 0.08));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .prediction-panel:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 20px 40px rgba(0, 102, 255, 0.2),
                0 0 25px rgba(0, 196, 140, 0.15),
                inset 0 0 0 1px rgba(0, 102, 255, 0.5);
            border-color: var(--primary-color);
        }

        .prediction-panel:hover::before {
            opacity: 1;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prediction-card {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(0, 196, 140, 0.1));
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .prediction-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.15);
            border-color: var(--primary-color);
        }

        .prediction-direction {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prediction-direction.up {
            color: #4CAF50;
        }

        .prediction-direction.down {
            color: #f44336;
        }

        .confidence-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid var(--border-color);
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
        }

        .market-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .data-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .data-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
            color: var(--text-secondary);
        }

        .data-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            animation: fadeIn 0.9s ease-out;
        }

        .stat-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideInUp 0.8s ease-out;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 102, 255, 0.2);
            border-color: var(--primary-color);
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            animation: pulse 2s ease-in-out infinite;
        }

        .spinner {
            border: 4px solid rgba(0, 102, 255, 0.2);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Navigation Bar */
        .navbar {
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.1);
            position: relative;
            z-index: 10;
            animation: slideInUp 0.4s ease-out;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .navbar .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .navbar .nav-link:hover {
            background: rgba(0, 102, 255, 0.1);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .navbar .nav-link.active {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.2), rgba(0, 196, 140, 0.2));
            color: var(--primary-color);
            border-color: var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 粒子背景画布 -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span>📈</span>
            <span>ICSFP</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">预测</a>
            <a href="/trading" class="nav-link">💹 模拟交易</a>
            <a href="/visualization" class="nav-link active">📊 可视化</a>
            <a href="/realtime" class="nav-link">⚡ 实时监控</a>
            <a href="/about" class="nav-link">关于</a>
            <a href="/health" class="nav-link">状态</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>📈 实时预测与数据可视化</h1>
            <p class="subtitle">基于深度学习的智能股票预测系统</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="stockSymbol">股票代码:</label>
                <select id="stockSelect" onchange="updateStockInput()">
                    <option value="">-- 选择常用股票 --</option>
                    <optgroup label="🇺🇸 科技巨头">
                        <option value="AAPL">AAPL - Apple Inc.</option>
                        <option value="MSFT">MSFT - Microsoft</option>
                        <option value="GOOG">GOOG - Alphabet (Google)</option>
                        <option value="AMZN">AMZN - Amazon</option>
                        <option value="META">META - Meta (Facebook)</option>
                        <option value="NVDA">NVDA - NVIDIA</option>
                        <option value="TSLA">TSLA - Tesla</option>
                        <option value="NFLX">NFLX - Netflix</option>
                    </optgroup>
                    <optgroup label="💻 半导体">
                        <option value="AMD">AMD - Advanced Micro Devices</option>
                        <option value="INTC">INTC - Intel</option>
                        <option value="TSM">TSM - Taiwan Semiconductor</option>
                    </optgroup>
                    <optgroup label="💰 金融科技">
                        <option value="JPM">JPM - JPMorgan Chase</option>
                        <option value="V">V - Visa</option>
                        <option value="PYPL">PYPL - PayPal</option>
                    </optgroup>
                    <optgroup label="🏢 其他">
                        <option value="WMT">WMT - Walmart</option>
                        <option value="DIS">DIS - Disney</option>
                        <option value="NKE">NKE - Nike</option>
                        <option value="BA">BA - Boeing</option>
                        <option value="IBM">IBM - IBM</option>
                    </optgroup>
                    <optgroup label="🇨🇳 中概股">
                        <option value="BABA">BABA - Alibaba</option>
                        <option value="JD">JD - JD.com</option>
                        <option value="PDD">PDD - Pinduoduo</option>
                        <option value="BIDU">BIDU - Baidu</option>
                    </optgroup>
                    <option value="custom">✏️ 自定义输入...</option>
                </select>
                <input type="text" id="stockSymbol" value="AAPL" placeholder="或直接输入股票代码" style="display: inline-block;">
            </div>
            <div class="control-group">
                <label for="days">历史天数:</label>
                <select id="days">
                    <option value="7">7天</option>
                    <option value="30" selected>30天</option>
                    <option value="90">90天</option>
                </select>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="useCausal" checked>
                    使用因果图增强
                </label>
            </div>
            <button onclick="loadStockData()">🔍 加载数据</button>
            <button onclick="predictStock()">🎯 预测</button>
            <button onclick="autoRefresh()">🔄 自动刷新</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">当前价格</div>
                <div class="stat-value" id="currentPrice">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">涨跌幅</div>
                <div class="stat-value" id="changePercent">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">预测方向</div>
                <div class="stat-value" id="predictionDirection">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">置信度</div>
                <div class="stat-value" id="predictionConfidence">--</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="chart-container">
                <div class="panel-title">📊 价格走势图</div>
                <canvas id="priceChart"></canvas>
            </div>

            <div class="prediction-panel">
                <div class="panel-title">🎯 预测结果</div>
                <div id="predictionContent">
                    <p style="text-align: center; color: #999; padding: 40px;">
                        点击"预测"按钮查看结果
                    </p>
                </div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <div>加载中...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        let priceChart = null;
        let autoRefreshInterval = null;

        // 更新股票输入框
        function updateStockInput() {
            const select = document.getElementById('stockSelect');
            const input = document.getElementById('stockSymbol');
            const value = select.value;
            
            if (value === 'custom') {
                input.value = '';
                input.focus();
                input.style.borderColor = 'var(--primary-color)';
            } else if (value) {
                input.value = value;
                input.style.borderColor = '';
                // 自动加载数据
                setTimeout(() => loadHistoricalData(), 200);
            }
        }

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '收盘价',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: {
                                    day: 'MM/dd'
                                }
                            },
                            title: {
                                display: true,
                                text: '日期'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '价格 ($)'
                            }
                        }
                    }
                }
            });
        }

        // 加载股票数据
        async function loadStockData() {
            const symbol = document.getElementById('stockSymbol').value.trim();
            const days = parseInt(document.getElementById('days').value);

            if (!symbol) {
                showError('请输入股票代码');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const endDate = new Date();
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - days);

                const response = await fetch(
                    `/api/v1/realtime/historical/${symbol}?` +
                    `start_date=${startDate.toISOString().split('T')[0]}&` +
                    `end_date=${endDate.toISOString().split('T')[0]}`
                );

                const data = await response.json();

                if (data.status === 'success') {
                    updateChart(data.data);
                    
                    // 同时获取实时报价
                    const quoteResponse = await fetch(`/api/v1/realtime/quote/${symbol}`);
                    const quoteData = await quoteResponse.json();
                    
                    if (quoteData.status === 'success') {
                        updateStats(quoteData.data);
                    }
                } else {
                    showError(data.message || '加载数据失败');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('加载数据时发生错误: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 更新图表
        function updateChart(data) {
            if (!priceChart) {
                initChart();
            }

            const labels = data.records.map(r => new Date(r.date));
            const prices = data.records.map(r => r.close);

            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = prices;
            priceChart.update();
        }

        // 更新统计信息
        function updateStats(quote) {
            document.getElementById('currentPrice').textContent = `$${quote.price.toFixed(2)}`;
            
            const changePercent = quote.change_percent;
            const changeElement = document.getElementById('changePercent');
            changeElement.textContent = `${changePercent > 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
            changeElement.style.color = changePercent > 0 ? '#4CAF50' : changePercent < 0 ? '#f44336' : '#fff';
        }

        // 预测股票
        async function predictStock() {
            const symbol = document.getElementById('stockSymbol').value.trim();
            const useCausal = document.getElementById('useCausal').checked;

            if (!symbol) {
                showError('请输入股票代码');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(
                    `/api/v1/realtime/predict/${symbol}?use_causal=${useCausal}`
                );

                const data = await response.json();

                if (data.status === 'success') {
                    displayPrediction(data.data);
                } else {
                    showError(data.message || '预测失败');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('预测时发生错误: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 显示预测结果
        function displayPrediction(result) {
            const pred = result.prediction;
            const directionClass = pred.direction === 'UP' ? 'up' : 'down';
            const directionIcon = pred.direction === 'UP' ? '▲' : '▼';
            const confidence = (pred.confidence * 100).toFixed(1);

            const html = `
                <div class="prediction-card">
                    <div style="font-size: 14px; opacity: 0.9;">预测结果</div>
                    <div class="prediction-direction ${directionClass}">
                        ${directionIcon} ${pred.direction}
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidence}%">
                            ${confidence}%
                        </div>
                    </div>
                    <div style="font-size: 14px; margin-top: 10px;">
                        预测方法: ${pred.method}<br>
                        使用特征: ${pred.features_used} 个
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #333;">
                        概率分布
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1; text-align: center; padding: 15px; background: rgba(76, 175, 80, 0.1); border-radius: 8px;">
                            <div style="color: #4CAF50; font-size: 24px; font-weight: bold;">
                                ${(pred.probabilities.UP * 100).toFixed(1)}%
                            </div>
                            <div style="color: #666; font-size: 12px;">上涨</div>
                        </div>
                        <div style="flex: 1; text-align: center; padding: 15px; background: rgba(244, 67, 54, 0.1); border-radius: 8px;">
                            <div style="color: #f44336; font-size: 24px; font-weight: bold;">
                                ${(pred.probabilities.DOWN * 100).toFixed(1)}%
                            </div>
                            <div style="color: #666; font-size: 12px;">下跌</div>
                        </div>
                    </div>
                </div>

                <div class="market-data">
                    <div class="data-item">
                        <div class="data-label">开盘价</div>
                        <div class="data-value">$${result.market_data.open?.toFixed(2) || '--'}</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">最高价</div>
                        <div class="data-value">$${result.market_data.high?.toFixed(2) || '--'}</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">最低价</div>
                        <div class="data-value">$${result.market_data.low?.toFixed(2) || '--'}</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">成交量</div>
                        <div class="data-value">${formatVolume(result.market_data.volume)}</div>
                    </div>
                </div>
            `;

            document.getElementById('predictionContent').innerHTML = html;

            // 更新顶部统计
            document.getElementById('predictionDirection').textContent = directionIcon + ' ' + pred.direction;
            document.getElementById('predictionDirection').style.color = directionClass === 'up' ? '#4CAF50' : '#f44336';
            document.getElementById('predictionConfidence').textContent = confidence + '%';
        }

        // 自动刷新
        function autoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                alert('自动刷新已停止');
            } else {
                autoRefreshInterval = setInterval(() => {
                    loadStockData();
                    predictStock();
                }, 60000); // 每60秒刷新
                alert('自动刷新已启动（每60秒）');
            }
        }

        // 格式化成交量
        function formatVolume(volume) {
            if (!volume) return '--';
            if (volume >= 1000000000) return (volume / 1000000000).toFixed(2) + 'B';
            if (volume >= 1000000) return (volume / 1000000).toFixed(2) + 'M';
            if (volume >= 1000) return (volume / 1000).toFixed(2) + 'K';
            return volume.toString();
        }

        // 显示/隐藏加载状态
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // 获取模型状态
        async function loadModelStatus() {
            try {
                const response = await fetch('/api/v1/realtime/model/status');
                const result = await response.json();
                
                if (result.status === 'success') {
                    const data = result.data;
                    console.log('=== 模型状态信息 ===');
                    console.log(`模型加载: ${data.model_loaded ? '✅ 已加载' : '⚠️ 未加载'}`);
                    console.log(`模型类型: ${data.model_type}`);
                    console.log(`参数量: ${data.parameters}`);
                    console.log(`因果增强: ${data.causal_enabled ? '✅ 启用' : '❌ 禁用'}`);
                    console.log(`训练数据: ${data.training_dataset}`);
                    console.log(`设备: ${data.device}`);
                    console.log(`预测方法: ${data.prediction_method === 'deep_learning' ? '🤖 深度学习' : '📏 规则引擎'}`);
                    console.log(`推理速度: ${data.inference_speed}`);
                    if (data.checkpoint_path) {
                        console.log(`检查点: ${data.checkpoint_path}`);
                    }
                    console.log('==================');
                    
                    // 如果有模型状态显示元素，更新它
                    const statusElement = document.getElementById('modelStatusBadge');
                    if (statusElement) {
                        if (data.model_loaded) {
                            statusElement.innerHTML = `<span style="color: #4CAF50;">✅ 模型已加载</span> (${data.prediction_method})`;
                            statusElement.title = `使用${data.model_type}模型，推理速度${data.inference_speed}`;
                        } else {
                            statusElement.innerHTML = `<span style="color: #FFB020;">⚠️ 使用规则预测</span>`;
                            statusElement.title = '模型未加载，使用基于规则的预测引擎';
                        }
                    }
                } else {
                    console.warn('获取模型状态失败:', result.message);
                }
            } catch (error) {
                console.error('获取模型状态出错:', error);
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', () => {
            initChart();
            loadStockData();
            loadModelStatus();  // 加载模型状态
        });
    </script>

    <!-- 粒子背景初始化 -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
            const particleCount = isMobile ? 40 : 100;
            
            const particlesBackground = new ParticlesBackground('particlesCanvas', {
                particleCount: particleCount,
                particleColor: 'rgba(0, 102, 255, 0.8)',
                lineColor: 'rgba(0, 196, 140, 0.2)',
                particleRadius: 2.5,
                lineDistance: 150,
                particleSpeed: 0.3,
                mouseRadius: 150,
                glowEffect: !isMobile
            });
        });
    </script>
</body>
</html>

dir_name: outputs_astock
task_name: astock_causal_discovery

log:
  stdout: true
  stderr: false
  tensorboard: true

model:
  mode: 'all'
  variant_type: 'hedge' # hedge, tech, fund, discriminative
  alpha: 0.5 # 0.1, 0.3, 0.5, 0.7, 0.9, 1.0
  dropout_vmd_in: 0.3
  dropout_mel_in: 0.3
  n_epochs: 20  # A股数据量较大，增加训练轮数
  batch_size: 32

  kl_lambda_anneal_rate: 0.005  # 0.005, 0.002, 0.001, 0.0005
  kl_lambda_start_step: 0
  daily_att: 'y'  # y, g

  vmd_rec: 'zh'  # zh or h (中文新闻)

  opt: 'adam'  # sgd, adam
  lr: 0.001
  clip: 15.0

  y_size: 2
  use_constant_kl_lambda: 0
  constant_kl_lambda: 0.1

  word_embed_type: 'glove'  # 需要中文词向量
  weight_init: 'xavier-uniform'
  mel_cell_type: 'gru'  # basic, gru, ln-lstm
  vmd_cell_type: 'gru'  # basic, gru, ln-lstm

  word_embed_size: 300
  stock_embed_size: 150
  init_stock_with_word: 0
  mel_h_size: 100
  h_size: 150
  g_size: 50

  shuffle: 1
  max_n_days: 5
  max_n_msgs: 30
  max_n_words: 40

  decay_step: 100
  decay_rate: 0.96
  momentum: 0.9

  use_in_bn: 0
  use_o_bn: 0
  use_g_bn: 0
  dropout_mel: 0.2   # GRU内部正则（原0.0）
  dropout_ce: 0.2    # 上下文编码器正则（原0.0）
  dropout_vmd: 0.2   # 变分预测器正则（原0.0）
  early_stopping_patience: 25  # 连续25次eval无提升则停止（约覆盖1个完整Epoch，原8太紧）

# A股数据集日期范围
dates:
  train_start_date: '2020-01-02'
  train_end_date: '2024-04-08'
  dev_start_date: '2024-04-09'
  dev_end_date: '2024-11-15'
  test_start_date: '2024-11-18'
  test_end_date: '2025-01-02'

data:
  # A股数据特定配置
  name: astock_returns
  feature: return  # return, close, high, low
  normalization: standard  # standard, minmax, none
  
  # 数据时间范围
  date_range:
    train_start: '2020-01-02'
    train_end: '2024-04-08'
    dev_start: '2024-04-09'
    dev_end: '2024-11-15'
    test_start: '2024-11-18'
    test_end: '2026-01-30'
  
  # 股票选择
  stock_selection:
    method: all  # all, sector, manual
    sectors: []
    stocks: []

  # 缺失数据配置
  missing: 
    name: mixed  # random, block, mixed
    params:
      p_missing: 0.1  # A股市场较少停牌
      block_size_min: 5
      block_size_max: 20


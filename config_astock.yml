# 因果发现配置（CUTS+）
reproduc:
  seed: 42
  benchmark: false
  deterministic: true

sota:
  cuts_plus:
    # 网络结构 - A股市场规模
    n_nodes: 200  # A股股票数量（扩充后200只）
    input_step: 1
    batch_size: 128
    data_dim: 1
    total_epoch: 150  # 更多轮次以学习复杂关系
    
    # 分组策略 - A股市场优化
    n_groups: 25  # 200只股票分25组（每组约8只）
    group_policy: multiply_2_every_30
    
    # 监督策略
    supervision_policy: masked_before_200
    fill_policy: rate_0.1_after_30
    show_graph_every: 20
    
    # 数据预测模型 - A股时间序列优化
    data_pred:
      model: multi_lstm
      pred_step: 1
      mlp_hid: 64
      gru_layers: 2
      shared_weights_decoder: false
      concat_h: true
      lr_data_start: 5e-3
      lr_data_end: 1e-4
      weight_decay: 1e-4
      prob: true
      dropout: 0.3  # A股波动性大，加强正则化
      
    # 图发现参数 - A股相关性特点
    graph_discov:
      lambda_s_start: 0.08  # 适中的稀疏性
      lambda_s_end: 0.01
      lr_graph_start: 5e-4
      lr_graph_end: 5e-5
      start_tau: 1.2
      end_tau: 0.1
      dynamic_sampling_milestones: [0]
      dynamic_sampling_periods: [1]
      
    # 因果阈值 - A股板块效应明显
    causal_thres: value_0.25  # 相对宽松以捕捉板块联动
    
# 分析配置
analysis:
  top_k_relationships: 30  # 显示更多因果关系
  save_figures: true
  figure_format: png
  figure_dpi: 300

# 路径配置 - A股数据路径
